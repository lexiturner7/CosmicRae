<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmicRae — APOD</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../assets/icons/favicon.ico"
    />
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/nav.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/apod.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <main>
      <div id="stars-layer"></div>
      <h2 class="page-title">Astronomy Picture of the Day!</h2>
      <div class="apod-header">
        <h3 id="apod-title"></h3>
      </div>

      <div class="apod-layout">
        <div class="apod-img-panel">
          <img id="apod-img" />
        </div>
        <div class="apod-content-panel card card-explore">
          <input id="apod-date-picker" type="date" min="1995-06-16" />
          <p id="apod-explanation"></p>
          <p id="apod-copyright"></p>
        </div>
      </div>
    </main>
    <script src="../../js/nav.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/apod.js"></script>
  </body>
</html>
