<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmicRae — Explore</title>
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/nav.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/explore.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <div id="stars-layer"></div>
    <main>
      <!-- ********* HERO SECTION ********* -->
      <section id="explore-hero-section">
        <div id="explore-stars"></div>

        <div id="explore-headline">
          <div id="headline-first">
            The Universe <span id="awaits">Awaits!</span>
          </div>
        </div>
      </section>

      <!-- ********* CARDS ********* -->
      <section id="explore-cards">
        <a href="timeline.html" class="card card-explore explore-card">
          <div class="explore-card-header">
            <h3>Space Timeline</h3>
          </div>
          <p>Timeline of the history of space</p>
        </a>

        <a href="apod.html" class="card card-explore explore-card">
          <div class="explore-card-header">
            <h3>Astronomy Picture of the Day</h3>
          </div>
          <p>View today's photo from NASA or view any previous day's photo!</p>
        </a>

        <a href="mrovergallery.html" class="card card-explore explore-card">
          <div class="explore-card-header">
            <h3>Mars Rover Gallery</h3>
          </div>
          <p>Photos taken from the Mars rover!</p>
        </a>

        <a href="news.html" class="card card-explore explore-card">
          <div class="explore-card-header">
            <h3>Space News</h3>
          </div>
          <p>Stay up-to-date will all space-related news</p>
        </a>
      </section>
    </main>
    <script src="../../js/nav.js"></script>
    <script src="../../js/explore.js"></script>
  </body>
</html>
