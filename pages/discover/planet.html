<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmicRae — Discover</title>
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/nav.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/planet.css" />
  </head>
  <body>
    <div id="stars-layer"></div>

    <div id="planet-navbar">
      <a id="mercury-nav" href="planet.html?id=mercury">
        <img src="../../assets/images/mercury.jpg" />
        <span>Mercury</span>
      </a>
      <a id="venus-nav" href="planet.html?id=venus">
        <img src="../../assets/images/venus.jpg" />
        <span>Venus</span>
      </a>
      <a id="earth-nav" href="planet.html?id=earth">
        <img src="../../assets/images/earth.jpg" />
        <span>Earth</span>
      </a>
      <a id="mars-nav" href="planet.html?id=mars">
        <img src="../../assets/images/mars.jpg" />
        <span>Mars</span>
      </a>
      <a id="jupiter-nav" href="planet.html?id=jupiter">
        <img src="../../assets/images/jupiter.jpg" />
        <span>Jupiter</span>
      </a>
      <a id="saturn-nav" href="planet.html?id=saturn">
        <img src="../../assets/images/saturn.jpg" />
        <span>Saturn</span>
      </a>
      <a id="uranus-nav" href="planet.html?id=uranus">
        <img src="../../assets/images/uranus.jpg" />
        <span>Uranus</span>
      </a>
      <a id="neptune-nav" href="planet.html?id=neptune">
        <img src="../../assets/images/neptune.jpg" />
        <span>Neptune</span>
      </a>
    </div>

    <div id="navbar"></div>

    <main>
      <div id="planet-hero">
        <div id="planet-hero-layout">
          <div id="planet-intro">
            <h1 id="planet-name"></h1>
            <p id="planet-tagline"></p>
            <p id="planet-funfact"></p>
          </div>
          <div id="planet-model-container">
            <!-- changed this from image to 3d model -->
            <model-viewer
              id="model"
              alt="3D model of a NASA asset"
              auto-rotate
              camera-controls
              shadow-intensity="1"
              style="width: 70%; height: 500px"
            >
            </model-viewer>
          </div>
        </div>
      </div>
      <nav id="planet-jump-links">
        <span
          style="
            color: var(--grey);
            display: flex;
            padding-right: 20px;
            align-items: center;
          "
          >Jump to ->
        </span>
      </nav>
      <h2 id="eotss">NASA's Eyes on the Solar System</h2>
      <div id="planet-featured-link"></div>
      <div id="planet-sections"></div>
      <div id="back-to-top">
        <a href="#">Back to Top ↑</a>
      </div>
    </main>
    <script src="../../js/nav.js"></script>
    <script src="../../js/planet.js"></script>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </body>
</html>
