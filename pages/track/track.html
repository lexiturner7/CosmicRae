<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmicRae — Track</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../assets/icons/favicon.ico"
    />
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/nav.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/track.css" />
    <link rel="stylesheet" href="../../css/footer.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <main>
      <div id="stars-layer"></div>
      <section id="track-hero-section">
        <div id="track-headline">
          <div id="liveSign" class="live-sign off">LIVE</div>
          <div><span id="from">from </span><span id="space">Space!</span></div>
        </div>
      </section>

      <!-- ********* CARDS ********* -->
      <section id="track-cards">
        <a href="asteroids.html" class="card card-track track-card">
          <div class="track-card-header">
            <h3>Asteroids</h3>
          </div>
          <p>Track all near-earth asteroids</p>
        </a>

        <a href="artemis2.html" class="card card-track track-card">
          <div class="track-card-header">
            <h3>Launches</h3>
          </div>
          <p>Live track NASA launches!</p>
        </a>

        <a href="iss.html" class="card card-track track-card">
          <div class="track-card-header">
            <h3>International Space Station ( ISS )</h3>
          </div>
          <p>Live map of the ISS location</p>
        </a>

        <a href="" class="card card-track track-card">
          <div class="track-card-header">
            <h3>
              Voyager <br /><span style="font-size: 16px; color: var(--green)"
                >🚧 Under Construction 🚧</span
              >
            </h3>
          </div>
          <p>Where is Voyager now?</p>
        </a>
      </section>
      <div id="footer"></div>
    </main>
    <script src="../../js/nav.js"></script>
    <script src="../../js/track.js"></script>
    <script src="../../js/footer.js"></script>
  </body>
</html>
