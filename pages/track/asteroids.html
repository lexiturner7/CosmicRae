<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmicRae — Asteroid Tracker</title>
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/nav.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/asteroids.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="navbar"></div>
    <div id="stars-layer"></div>
    <main>
      <!-- ******** HERO SECTION ********** -->
      <section id="asteroid-hero">
        <h2 id="asteroid-headline">
          Asteroid <span style="color: var(--green)">Watch</span>
        </h2>
        <h4 id="asteroid-tagline">
          Real-time tracking of near-Earth asteroids from NASA's Center for Near
          Earth Object Studies.<br />Updated daily with the latest close
          approach data.
        </h4>
      </section>

      <!-- ******** STAT SECTION ********** -->
      <section id="today-stats">
        <div id="asteroid-count">
          <span class="stat-number" id="stat-total">--</span>
          <span class="stat-label">Asteroids Today</span>
        </div>
        <div id="hazardous-count">
          <span class="stat-number" id="stat-hazardous">--</span>
          <span class="stat-label">Potentially Hazardous</span>
        </div>
        <div id="closest">
          <span class="stat-number" id="stat-closest">--</span>
          <span class="stat-label">Closest Approach</span>
        </div>
        <div id="largest">
          <span class="stat-number" id="stat-largest">--</span>
          <span class="stat-label">Largest Today</span>
        </div>
      </section>

      <!-- ******** FILTER SECTION ********** -->
      <section id="asteroid-filters">
        <div id="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="hazardous">
            ⚠ Hazardous Only
          </button>
        </div>
        <select id="sort-select">
          <option value="distance">Sort: Closest First</option>
          <option value="size">Sort: Largest First</option>
          <option value="date">Sort: Date</option>
        </select>
      </section>

      <!-- ******** CHART SECTION ********** -->
      <section id="asteroid-chart-section">
        <div id="chart-header">
          <span id="chart-title"
            >Miss Distance Overview — Lunar Distances from Earth</span
          >
        </div>
        <div id="asteroid-chart-container">
          <canvas id="asteroid-chart"></canvas>
        </div>
      </section>

      <!-- ******** ASTEROID LIST ********** -->
      <section id="asteroid-list"></section>
    </main>
    <script src="../../js/nav.js"></script>
    <script src="../../js/asteroids.js"></script>
  </body>
</html>
